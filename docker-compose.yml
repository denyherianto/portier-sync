services:
  app:
    build: .
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-portier_sync}
      - POSTGRES_USER=${POSTGRES_USER:-portier}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-portier}
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-portier_sync}
      POSTGRES_USER: ${POSTGRES_USER:-portier}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-portier}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-portier} -d ${POSTGRES_DB:-portier_sync}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  db_data:
